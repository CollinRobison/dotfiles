# make a sym link to ~/.config/kitty/quick-access-terminal.conf
#
# macOS global shortcut reminder:
# This quick access terminal is opened by a macOS Keyboard Shortcut, not a
# kitty.conf `map` entry. See the kitty docs:
# https://sw.kovidgoyal.net/kitty/kittens/quick-access-terminal/
#
# Kitty docs note: in kitty, run the quick-access setup command to show the
# quick access window, then close it by running the command again or pressing
# ctrl+d. Then go to System Preferences -> Keyboard -> Keyboard Shortcuts ->
# Services -> General and set a shortcut for the "Quick access to kitty" entry.
# Bind that service to option+cmd+\. Depending on where kitty is installed and
# macOS permissions, the setup command may need to be run with sudo.
#
# macOS workaround if the Services -> General section or "Quick access to
# kitty" entry does not appear, from GitHub discussion #8843:
# https://github.com/kovidgoyal/kitty/discussions/8843
# 1. Open Applications in Finder.
# 2. Right-click kitty and choose "Show Package Contents".
# 3. Find and run the `kitty-quick-access` application inside the package.
# 4. Exit the quick access window with ctrl+d.
# 5. Reopen Keyboard Shortcuts -> Services -> General; the entry should appear.


lines 500px
edge top
background_opacity 0.70
hide_on_focus_loss yes

kitty_override background=#000000
kitty_override background_opacity=0.70
kitty_override background_blur=1
kitty_override cursor=#bbbbbb
kitty_override hide_window_decorations=titlebar-only
kitty_override macos_titlebar_color=background
kitty_override window_padding_width=1
kitty_override tab_bar_style=hidden
kitty_override confirm_os_window_close=0
